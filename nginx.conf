worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream tileserver { server 127.0.0.1:8080; }
    upstream photon     { server 127.0.0.1:2322; }
    upstream osrm       { server 127.0.0.1:5000; }

    server {
        listen 80;
        server_name _;

        # Frontend
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Tile server
        location /tiles/ {
            proxy_pass http://tileserver/;
            proxy_set_header Host $host;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header Access-Control-Allow-Origin "*";
        }

        # Search / Geocoding
        location /search {
            proxy_pass http://photon/api;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin "*";
        }

        location /reverse {
            proxy_pass http://photon/reverse;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin "*";
        }

        # Routing
        location /route/ {
            proxy_pass http://osrm/;
            proxy_set_header Host $host;
            add_header Access-Control-Allow-Origin "*";
        }
    }
}
