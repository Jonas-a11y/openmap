worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ── Basics ──────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon
        application/octet-stream;  # for .pbf vector tiles

    # ── Rate limiting (protect public fallback endpoints) ────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=tiles:10m rate=100r/s;

    # ── Proxy cache ─────────────────────────────────────────────────────────
    proxy_cache_path /tmp/nginx-cache
        levels=1:2
        keys_zone=tile_cache:10m
        max_size=1g
        inactive=30d
        use_temp_path=off;

    # ── Upstreams ────────────────────────────────────────────────────────────
    upstream photon {
        server 127.0.0.1:2322;
        keepalive 4;
    }
    upstream osrm {
        server 127.0.0.1:5000;
        keepalive 4;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        root /var/www/html;
        index index.html;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Content-Type-Options   "nosniff"          always;
        add_header X-Frame-Options          "SAMEORIGIN"       always;
        add_header X-XSS-Protection         "1; mode=block"    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── Health check (for Docker HEALTHCHECK) ────────────────────────
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ── Static frontend ──────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # ── PMTiles — serve directly from /data/tiles/ ────────────────────
        # MapLibre does HTTP Range requests against /tiles/map.pmtiles.
        # Nginx natively supports Range requests for static files (alias).
        location /tiles/ {
            alias /data/tiles/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            add_header Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range" always;

            # Handle OPTIONS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }

        # ── Photon search ────────────────────────────────────────────────
        location = /search {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://photon/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
            proxy_cache           tile_cache;
            proxy_cache_key       $uri$is_args$args;
            proxy_cache_valid     200 1h;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            add_header Access-Control-Allow-Origin "*";
            add_header X-Cache-Status $upstream_cache_status;
        }

        location = /reverse {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://photon/reverse;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
            add_header Access-Control-Allow-Origin "*";
        }

        # ── OSRM routing ─────────────────────────────────────────────────
        location /route/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://osrm/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Error pages ──────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            default_type text/html;
            return 502 '<html><body><h2>Service temporarily unavailable</h2></body></html>';
        }
    }
}
